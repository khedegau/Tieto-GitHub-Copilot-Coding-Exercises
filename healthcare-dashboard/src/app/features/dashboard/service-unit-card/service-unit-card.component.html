<mat-card class="unit-card">
  <mat-card-header>
    <mat-card-title>{{ snapshot.serviceUnit }}</mat-card-title>
    <span class="status-badge" [class]="badgeClass">{{ snapshot.capacityStatus }}</span>
  </mat-card-header>
  <mat-card-content>
    <div class="metrics-grid">
      <div class="metric">
        <span class="metric-label">Demand</span>
        <span class="metric-value">{{ snapshot.demand }}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Capacity</span>
        <span class="metric-value">{{ snapshot.capacity }}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Encounters</span>
        <span class="metric-value">{{ snapshot.encounterCount }}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Return Visits</span>
        <span class="metric-value">{{ snapshot.returnVisitCount }}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Return Rate</span>
        <span class="metric-value">{{ returnVisitRate }}</span>
      </div>
      <div class="metric">
        <span class="metric-label">Gap</span>
        <span class="metric-value">{{ snapshot.demand - snapshot.capacity }}</span>
      </div>
    </div>
  </mat-card-content>
</mat-card>
